defaults:
  - logger: mlflow
  - data: single_image
  - model: resnet50
  - classes: imagenet
  - replacement: mean_color
  - _self_

# Shared hyperparameters
target_class_idx: null
batch_size: 64
seed: 42

# Extremal-Perturbation-specific hyperparameters
ep:
  area: 0.1                    # fraction of image to keep
  max_time: 60.0               # wall-clock budget (seconds)
  max_iterations: 800          # hard cap on Adam iterations
  learning_rate: 0.05
  mask_step: 7                 # low-res parameterization step (pixels)
  mask_sigma: 21.0             # Gaussian smoothing sigma applied to the mask
  area_lambda: 300.0           # initial area-penalty weight
  area_lambda_growth: 1.0035   # per-iteration growth factor
