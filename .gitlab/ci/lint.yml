ruff-lint:
  stage: lint
  script:
    - pdm lint
  rules:
    - !reference [.merge_request_pipelines, rules]


ruff-format:
  stage: lint
  script:
    - pdm format --check
  rules:
    - !reference [.merge_request_pipelines, rules]


mypy:
  stage: lint
  allow_failure: true
  script:
    - pdm mypy
  cache:
    paths:
      - .mypy_cache
  rules:
    - !reference [.merge_request_pipelines, rules]
