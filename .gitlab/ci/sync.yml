sync:
  image: bitnami/git
  variables:
    USER_NAME: "group_1021_bot_390f0b45d22bcd3d4999f51de6ad8742"
    USER_EMAIL: "group_1021_bot_390f0b45d22bcd3d4999f51de6ad8742@noreply.gitlab.ics.muni.cz"
    TEMPLATE_REPO: https://${USER_NAME}:${GROUP_ACCESS_TOKEN_RW}@gitlab.ics.muni.cz/rationai/digital-pathology/templates/python.git
    COMMIT_MESSAGE: "ci: sync with template repository"
    MERGE_REQUEST_TITLE: "ci: automated MR from Template"
  before_script:
    - git config --global user.name "${USER_NAME}"
    - git config --global user.email "${USER_EMAIL}"
  script:
    - git pull "${TEMPLATE_REPO}" --no-rebase --allow-unrelated-histories --no-commit -X theirs
    - >
      if ! git diff --cached --quiet; then
        echo "📂 Files that will be commited:"
        git diff --cached --name-only

        git commit -m "${COMMIT_MESSAGE}"
        git push "https://${USER_NAME}:${GROUP_ACCESS_TOKEN_RW}@${CI_REPOSITORY_URL#*@}" HEAD:$CI_COMMIT_REF_NAME \
          -o merge_request.create -o merge_request.target=${CI_DEFAULT_BRANCH} -o merge_request.remove_source_branch -o merge_request.title="${MERGE_REQUEST_TITLE}"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $TEMPLATE_CI_BRANCH && $CI_PIPELINE_SOURCE == 'schedule'
  cache: {}
