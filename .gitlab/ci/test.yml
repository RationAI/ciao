pytest:
  stage: test
  script:
    # Allow pytest to fail with exit code 5 (no tests collected)
    - pdm test --cov --cov-report term --cov-report xml:coverage.xml --junitxml=report.xml || ( exit_code=$?; [ $exit_code -eq 5 ] && exit 0 || exit $exit_code )
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  cache:
    paths:
      - .pytest_cache
  rules:
    - !reference [.merge_request_pipelines, rules]
